# eksctl create cluster --config-file=eksctl.yaml
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1
managedNodeGroups:
  - name: managed
    instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"]
    desiredCapacity: 2
    spot: true